name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSIMDTEXT_USE_HIGHWAY=ON \
            -DSIMDTEXT_BUILD_CLI=ON \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Install
        run: cmake --install build

      - name: Package
        run: |
          cd install
          tar czf ../simdtext-linux-x86_64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: simdtext-linux-x86_64
          path: simdtext-linux-x86_64.tar.gz

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            suffix: macos-x86_64
          - os: macos-14
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSIMDTEXT_USE_HIGHWAY=ON \
            -DSIMDTEXT_BUILD_CLI=ON \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Install
        run: cmake --install build

      - name: Package
        run: |
          cd install
          tar czf ../simdtext-${{ matrix.suffix }}.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: simdtext-${{ matrix.suffix }}
          path: simdtext-${{ matrix.suffix }}.tar.gz

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DSIMDTEXT_USE_HIGHWAY=ON `
            -DSIMDTEXT_BUILD_CLI=ON `
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config Release

      - name: Install
        run: cmake --install build --config Release

      - name: Package
        run: |
          cd install
          Compress-Archive -Path * -DestinationPath ..\simdtext-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: simdtext-windows-x86_64
          path: simdtext-windows-x86_64.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
