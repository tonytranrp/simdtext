name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler }}
      - name: Configure
        run: |
          CXX=${{ matrix.compiler }} cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSIMDTEXT_USE_HIGHWAY=OFF
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}
      - name: Test
        run: ./build/test_simdtext

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSIMDTEXT_USE_HIGHWAY=OFF
      - name: Build
        run: cmake --build build
      - name: Test
        run: ./build/test_simdtext

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DSIMDTEXT_USE_HIGHWAY=OFF
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ./build/Release/test_simdtext.exe
